[package]
name = "amux-platform"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
amux-core = { path = "../amux-core" }

# Terminal emulation (Alacritty's battle-tested backend)
alacritty_terminal = "0.25"

# Cross-platform PTY support
portable-pty = "0.8"

# Async runtime for reading PTY output
tokio = { version = "1", features = ["sync", "rt"] }

# For async Read/Write traits
futures-lite = "2"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# System information (CPU, memory, processes)
sysinfo = "0.32"

