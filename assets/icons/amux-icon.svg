<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1c2e"/>
      <stop offset="100%" stop-color="#141520"/>
    </linearGradient>
    <linearGradient id="acc" x1="64" y1="64" x2="192" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#81a2be"/>
      <stop offset="100%" stop-color="#8abeb7"/>
    </linearGradient>
    <filter id="g"><feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="8" y="8" width="240" height="240" rx="48" fill="url(#bg)"/>
  <rect x="8" y="8" width="240" height="240" rx="48" fill="none" stroke="#2a2d3d" stroke-width="1.5"/>

  <!-- Top-left pane -->
  <rect x="36" y="40" width="108" height="92" rx="6" fill="#1e2030"/>
  <rect x="48" y="56" width="40" height="2.5" rx="1" fill="#b5bd68" opacity="0.5"/>
  <rect x="48" y="66" width="70" height="2.5" rx="1" fill="#c5c8c6" opacity="0.22"/>
  <rect x="48" y="76" width="50" height="2.5" rx="1" fill="#81a2be" opacity="0.38"/>
  <rect x="48" y="86" width="75" height="2.5" rx="1" fill="#c5c8c6" opacity="0.18"/>
  <rect x="48" y="96" width="30" height="2.5" rx="1" fill="#cc6666" opacity="0.35"/>
  <rect x="48" y="108" width="6" height="10" rx="1" fill="#81a2be" opacity="0.75"/>

  <!-- Top-right pane -->
  <rect x="152" y="40" width="68" height="92" rx="6" fill="#1e2030"/>
  <rect x="162" y="56" width="35" height="2.5" rx="1" fill="#b294bb" opacity="0.38"/>
  <rect x="162" y="66" width="45" height="2.5" rx="1" fill="#c5c8c6" opacity="0.2"/>
  <rect x="162" y="76" width="30" height="2.5" rx="1" fill="#8abeb7" opacity="0.35"/>
  <rect x="162" y="86" width="40" height="2.5" rx="1" fill="#c5c8c6" opacity="0.18"/>
  <rect x="162" y="98" width="5" height="9" rx="1" fill="#8abeb7" opacity="0.65"/>

  <!-- Bottom pane -->
  <rect x="36" y="142" width="184" height="74" rx="6" fill="#1e2030"/>
  <rect x="48" y="156" width="14" height="2.5" rx="1" fill="#b5bd68" opacity="0.55"/>
  <rect x="66" y="156" width="55" height="2.5" rx="1" fill="#c5c8c6" opacity="0.25"/>
  <rect x="48" y="166" width="90" height="2.5" rx="1" fill="#c5c8c6" opacity="0.18"/>
  <rect x="48" y="176" width="65" height="2.5" rx="1" fill="#81a2be" opacity="0.28"/>
  <rect x="48" y="186" width="14" height="2.5" rx="1" fill="#b5bd68" opacity="0.55"/>
  <rect x="66" y="185" width="6" height="10" rx="1" fill="#f0c674" opacity="0.8"/>

  <!-- Split lines with glow -->
  <line x1="148" y1="44" x2="148" y2="128" stroke="url(#acc)" stroke-width="1.5" filter="url(#g)" opacity="0.65"/>
  <line x1="40" y1="138" x2="216" y2="138" stroke="url(#acc)" stroke-width="1.5" filter="url(#g)" opacity="0.65"/>
</svg>
