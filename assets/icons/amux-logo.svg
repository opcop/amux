<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background gradient: deep dark with subtle warmth -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1c2e"/>
      <stop offset="100%" stop-color="#141520"/>
    </linearGradient>
    <!-- Accent gradient: cool blue-cyan from the Tomorrow Night palette -->
    <linearGradient id="accent" x1="128" y1="128" x2="384" y2="384" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#81a2be"/>
      <stop offset="100%" stop-color="#8abeb7"/>
    </linearGradient>
    <!-- Subtle glow for the split lines -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Pane content: faint "code lines" -->
    <linearGradient id="pane-tl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c5c8c6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c5c8c6" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <!-- Outer rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80"
        fill="none" stroke="#2a2d3d" stroke-width="2"/>

  <!-- === Split Pane Layout (forms abstract "A") === -->
  <!-- The layout: top-left large pane, top-right narrow pane, bottom full-width pane -->
  <!-- This creates an inverted "T" / abstract "A" shape from the split lines -->

  <!-- Top-left pane: main terminal (largest) -->
  <rect x="72" y="80" width="224" height="200" rx="8" fill="#1e2030" stroke="#2a2d3d" stroke-width="1.5"/>
  <!-- Faux code lines in top-left pane -->
  <rect x="88" y="104" width="80" height="3" rx="1.5" fill="#b5bd68" opacity="0.5"/>
  <rect x="88" y="118" width="140" height="3" rx="1.5" fill="#c5c8c6" opacity="0.25"/>
  <rect x="88" y="132" width="100" height="3" rx="1.5" fill="#81a2be" opacity="0.4"/>
  <rect x="88" y="146" width="160" height="3" rx="1.5" fill="#c5c8c6" opacity="0.2"/>
  <rect x="88" y="160" width="50" height="3" rx="1.5" fill="#cc6666" opacity="0.4"/>
  <rect x="88" y="174" width="120" height="3" rx="1.5" fill="#c5c8c6" opacity="0.25"/>
  <rect x="88" y="188" width="90" height="3" rx="1.5" fill="#f0c674" opacity="0.35"/>
  <rect x="88" y="202" width="140" height="3" rx="1.5" fill="#c5c8c6" opacity="0.2"/>
  <!-- Cursor block in top-left -->
  <rect x="88" y="220" width="8" height="14" rx="1" fill="#81a2be" opacity="0.8"/>

  <!-- Top-right pane: secondary terminal -->
  <rect x="308" y="80" width="132" height="200" rx="8" fill="#1e2030" stroke="#2a2d3d" stroke-width="1.5"/>
  <!-- Faux output lines in top-right pane -->
  <rect x="322" y="104" width="60" height="3" rx="1.5" fill="#b294bb" opacity="0.4"/>
  <rect x="322" y="118" width="90" height="3" rx="1.5" fill="#c5c8c6" opacity="0.2"/>
  <rect x="322" y="132" width="70" height="3" rx="1.5" fill="#8abeb7" opacity="0.35"/>
  <rect x="322" y="146" width="80" height="3" rx="1.5" fill="#c5c8c6" opacity="0.18"/>
  <rect x="322" y="160" width="40" height="3" rx="1.5" fill="#b5bd68" opacity="0.35"/>
  <rect x="322" y="174" width="95" height="3" rx="1.5" fill="#c5c8c6" opacity="0.2"/>
  <!-- Cursor in top-right -->
  <rect x="322" y="192" width="7" height="12" rx="1" fill="#8abeb7" opacity="0.7"/>

  <!-- Bottom pane: full width -->
  <rect x="72" y="296" width="368" height="136" rx="8" fill="#1e2030" stroke="#2a2d3d" stroke-width="1.5"/>
  <!-- Prompt and output in bottom pane -->
  <rect x="88" y="316" width="24" height="3" rx="1.5" fill="#b5bd68" opacity="0.6"/>
  <rect x="118" y="316" width="100" height="3" rx="1.5" fill="#c5c8c6" opacity="0.3"/>
  <rect x="88" y="330" width="180" height="3" rx="1.5" fill="#c5c8c6" opacity="0.18"/>
  <rect x="88" y="344" width="140" height="3" rx="1.5" fill="#81a2be" opacity="0.3"/>
  <rect x="88" y="358" width="200" height="3" rx="1.5" fill="#c5c8c6" opacity="0.2"/>
  <rect x="88" y="372" width="24" height="3" rx="1.5" fill="#b5bd68" opacity="0.6"/>
  <!-- Blinking cursor in bottom pane -->
  <rect x="118" y="370" width="8" height="14" rx="1" fill="#f0c674" opacity="0.85"/>

  <!-- === Split divider lines (the signature element) === -->
  <!-- Vertical split between top-left and top-right -->
  <line x1="302" y1="88" x2="302" y2="272" stroke="url(#accent)" stroke-width="2" filter="url(#glow)" opacity="0.7"/>
  <!-- Horizontal split between top row and bottom -->
  <line x1="80" y1="290" x2="432" y2="290" stroke="url(#accent)" stroke-width="2" filter="url(#glow)" opacity="0.7"/>

  <!-- === "AMUX" text at bottom === -->
  <text x="256" y="462" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="36" font-weight="700" letter-spacing="8" fill="url(#accent)" opacity="0.6">
    AMUX
  </text>
</svg>
